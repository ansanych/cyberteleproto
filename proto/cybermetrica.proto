syntax = "proto3";
import "cyber.proto";

package cybertele;

option go_package = "./proto";

service Cybermetrica {
    rpc Health (Empty) returns (HealthReply) {}
    rpc ParserState (Empty) returns (ParserStatus) {}
    rpc ParserStart (Empty) returns (ParserStatus) {}
    rpc ParserStop (Empty) returns (ParserStatus) {}
    rpc ParserLogs (PageRequest) returns (ParserMetricaLogsReply) {}
    rpc MachineLogs (PageRequest) returns (ParserMetricaLogsReply) {}
    rpc MachineDataTypes (Machine) returns (MachineDataTypesReply) {}
    rpc MachineDayStatistic (MachineStatisticRequest) returns (DayData) {}
    rpc MachineDaysStatistic (MachineStatisticRequest) returns (DaysData) {}
    rpc MachineErrors (MachineStatisticRequest) returns (MachineErrorsReply) {}
    rpc MachineGraph (MachineStatisticRequest) returns (GraphData) {}
    rpc MachineGps (MachineStatisticRequest) returns (GpsData) {}
    rpc AllDataTypes (Empty) returns (DataTypes) {}
    rpc MachineStatistic (MachineStatisticRequest) returns (StatisticData) {}
    rpc MachineStatisticPeriod (MachineStatisticRequest) returns (StatisticPeriod) {}
}

message RawGPS {
    int64 time = 1;
    repeated float value = 2;
}

message GpsDataBlock {
    string start = 1;
    string end = 2;
    int64 startUnix = 3;
    int64 endUnix = 4;
    repeated RawGPS gps = 5;
}

message GpsData {
    repeated GpsDataBlock data = 1;
}

message ParserMetricaLog {
    int64 id = 1;
    string sn = 2;
    int32 count = 3;
    string startAt = 4;
    string endAt = 5;
    repeated string errors = 6;
    repeated string dataTypes = 7;
    string createdAt = 8;
}

message ParserMetricaLogsReply {
    repeated ParserMetricaLog data = 1;
    Pagination pagination = 2;
}

message MachineDataType {
    DataType dataType = 1;
    string lastDataTime = 2;
}

message MachineDataTypesReply {
    repeated MachineDataType data = 1;
}

message MachineStatisticRequest {
    string sn = 1;
    int32 timezone = 2;
    string date = 3;
    string from = 4;
    string to = 5;
    string graph = 6;
    float code = 7;
    string period = 8;
}

message DaysData {
    repeated DayData data = 1;
}

message DayData {
    string sn = 1;
    int32 timezone = 2;
    string date = 3;
    DayDataValues connection = 4;
    DayDataValues workhours = 5;
    DayDataValues engine = 6;
    DayDataValues job = 7;
    bool hasErrors = 8;
}

message DayDataValues {
    string start = 1;
    string end = 2;
    int64 duration = 3;
    float min = 4;
    float max = 5;
    float value = 6;
    repeated BlockValue blocks = 7;
}

message BlockValue {
    string start = 1;
    string end = 2;
    int64 startUnix = 3;
    int64 endUnix = 4;
}

message MachineErrorsReply {
    repeated MachineError errors = 1;
}

message MachineError {
    float code = 1;
    repeated MachineErrorBlock blocks = 2;
}

message MachineErrorBlock {
    string start = 1;
    string end = 2;
    int64 startUnix = 3;
    int64 endUnix = 4;
    float code = 5;
}

message GraphData {
    float min = 1;
    float max = 2;
    float value = 3;
    repeated GraphBlockValues blocks = 4;
}

message GraphBlockValues {
    string start = 1;
    string end = 2;
    int64 startUnix = 3;
    int64 endUnix = 4;
    repeated RawItem rawData = 5;
}

message RawItem {
    int64 time = 1;
    float value = 2;
}

message StatisticData {
    string sn = 1;
    int32 timezone = 2;
    string from = 3;
    string to = 4;
    StatisticEngine engine = 5;
    StatisticWorkhours workhours = 6;
    int64 job = 7;
    int64 lost = 8;
    StatisticFuel fuel = 9;
}

message StatisticWorkhours {
    float workhours = 1;
    float start = 2;
    float end = 3;
}

message StatisticEngine {
    int64 all = 1;
    int64 idle = 2;
    int64 work = 3;
    int64 highRPM = 4;
}

message StatisticFuel {
    int32 consumption = 1;
    int32 drainVolume = 2;
    int32 drainCount = 3;
    int32 refillVolume = 4;
    int32 refillCount = 5;
}

message StatisticPeriod {
    string sn = 1;
    int32 timezone = 2;
    string from = 3;
    string to = 4;
    string period = 5;
    string step = 6;
    repeated StatisticPeriodItem data = 7;
    float workhoursStart = 8;
    float workhoursEnd = 9;
    StatisticFuel fuel = 10;
    int32 errorsCount = 11;
    int64 connection = 12;
}

message StatisticPeriodItem {
    string label = 1;
    float workhours = 2;
    StatisticEngine engine = 3;
    StatisticFuel fuel = 4;
    int64 job = 5;
    int64 connection = 6;
    int32 errorsCount = 7;
}