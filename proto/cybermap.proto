syntax = "proto3";
import "cyber.proto";

package cybertele;

option go_package = "./proto";

service Cybermap {
    rpc Health (Empty) returns (HealthReply) {}
    rpc ParserState (Empty) returns (ParserStatus) {}
    rpc ParserStart (Empty) returns (ParserStatus) {}
    rpc ParserStop (Empty) returns (ParserStatus) {}
    rpc ParserLogs (PageRequest) returns (ParserMapLogsReply) {}
    rpc InRadius (RadiusRequest) returns (MapReply) {}
}

message ParserMapLog {
    int64 id = 1;
    int32 count = 2;
    repeated string errors = 3;
    string createdAt = 4;
}

message ParserMapLogsReply {
    repeated ParserMapLog data = 1;
    Pagination pagination = 2;
}

message Geom {
    float lat = 1;
    float lon = 2;
}

message RadiusRequest {
    Geom center = 1;
    int32 radius = 2;
}

message MapReply {
    repeated MachineMapData data = 1;
}

message MachineMapData {
    int32 sn = 1;
    float workhours = 2;
    Geom coords = 3;
    string timePoint = 4;
    string updatedAt = 5;
}